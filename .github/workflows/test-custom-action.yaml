name: Testing my custom action
on: 
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      file_validate:
        description: 'type the name of file to performa a validate'
        required: true
        default: 'readme.md'


jobs:
  test-custom-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #USING THE CUSTOM ACTION
      - name: Run custom file validation action
        id: validate
        uses: ./.github/actions/file-validate
        with:
          file-name: 'readme.md'  # Cambia esto al nombre del archivo que deseas validar

      - name: Show the ouput 
        run: |
          echo "validation performed at: ${{ steps.validate.outputs.currtent-time }}"