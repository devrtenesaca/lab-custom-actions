name: Testing my custom action
on: [push, workflow_dispatch]

jobs:
  test-custom-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #USING THE CUSTOM ACTION
      - name: Run custom file validation action
        id: validate
        uses: ./.github/actions/file-validate
        with:
          file-name: 'readme.md'  # Cambia esto al nombre del archivo que deseas validar

      - name: Show the ouput 
        run: |
          echo "validation performed at: ${{ steps.validate.outputs.currtent-time }}"